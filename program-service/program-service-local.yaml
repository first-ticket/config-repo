# ──────────────────────────────────────────
# program-service-local.yaml
# ──────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: local

  flyway:
    baseline-on-migrate: true
    create-schemas: true

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        show_sql: true

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.firstticket: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

common:
  messaging:
    scheduler:
      enabled: false
