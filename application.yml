# 모든 서비스에 공통으로 적용되는 설정
spring:
  jackson:
    time-zone: Asia/Seoul
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: refresh, health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
