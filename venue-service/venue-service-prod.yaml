# ──────────────────────────────────────────
# venue-service-prod.yaml
# ──────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    properties:
      hibernate:
        show_sql: false
        default_schema: venue_schema

management:
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    com.firstticket: INFO
    org.hibernate.SQL: WARN

feign:
  program-service:
    url: http://program-service:8080

server:
  port: 8080
