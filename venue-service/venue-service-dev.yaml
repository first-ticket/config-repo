# ──────────────────────────────────────────
# venue-service-dev.yaml
# ──────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    baseline-on-migrate: true
    baseline-version: 1

  jpa:
    properties:
      hibernate:
        show_sql: false
        default_schema: program_schema
    hibernate:
      ddl-auto: create

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.firstticket: DEBUG
    org.hibernate.SQL: DEBUG

feign:
  program-service:
    url: http://program-service:8080

server:
  port: 8080