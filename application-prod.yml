# 운영 환경에서 모든 서비스에 적용
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/first_ticket
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: redis
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
