# ──────────────────────────────────────────
# venue-service-prod.yaml
# ──────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}
    producer:
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

management:
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    com.firstticket: INFO
    org.hibernate.SQL: WARN
