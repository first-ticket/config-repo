# user-service 기본 설정

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: user_schema

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false #로컬에서만 true
    schemas: user_schema
    default-schema: user_schema
    create-schemas: true

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  datasource:
    # PostgreSQL JDBC 드라이버 명시
    driver-class-name: org.postgresql.Driver

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    tls:
      enabled: false
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info

keycloak:
  realm: first-ticket
  client-id: user-client