spring:
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: payment_schema
        format_sql: true

  flyway:
    schemas: payment_schema
    default-schema: payment_schema
    create-schemas: true

messaging:
  outbox:
    enabled: true
    scheduler:
      enabled: true
  inbox:
    enabled: true