# ──────────────────────────────────────────
# program-service-prod.yaml
# ──────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    properties:
      hibernate:
        show_sql: false
        default_schema: program_schema

  data:
    timeout: 2000ms # 연결 타임아웃 추가
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2

  # zipkin은 컨테이너 서비스 이름
  tracing:
    sampling:
      probability: 0.1 # 임시 테스트

logging:
  level:
    com.firstticket: INFO
    org.hibernate.SQL: WARN

feign:
  seat-service:
    url: http://seat-service:8080
  venue-service:
    url: http://venue-service:8080

server:
  port: 8080
