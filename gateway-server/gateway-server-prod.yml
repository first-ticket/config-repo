# gateway-server-prod.yml - 운영 환경 오버라이드
# 민감한 주소값은 환경변수로 주입 (ECS Task Definition의 환경변수 섹션 등)

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # 운영 Keycloak 주소. ECS Task 환경변수 KEYCLOAK_JWK_SET_URI 로 주입.
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

  data:
    redis:
      # 운영 Redis 주소 - Docker Compose 환경변수 REDIS_HOST로 주입
      host: ${REDIS_HOST}
      port: 6379

eureka:
  client:
    service-url:
      # 운영 Eureka 주소. ECS Task 환경변수 EUREKA_DEFAULT_ZONE 으로 주입.
      defaultZone: ${EUREKA_DEFAULT_ZONE}

management:
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: WARN
    com.firstticket: INFO
