# ──────────────────────────────────────────
# venue-service-dev.yaml
# ──────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI}/eureka

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.firstticket: DEBUG
    org.hibernate.SQL: DEBUG
